name: powerpacks-binaries

# Build prebuilt wacli binaries per-arch and attach them to the tag's GitHub
# Release so Powerpacks can download the pinned binary directly — no Go toolchain
# on the user's machine. CGo (mattn/go-sqlite3) is compiled natively on each
# runner (cross-compiling CGo is painful), so every target has its own runner.
# Independent of upstream's release.yml; triggers only on our -fullsync tags.

on:
  push:
    tags:
      - "v*-fullsync"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release (e.g. v0.13.0-fullsync)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14, goos: darwin, goarch: arm64 }
          - { runner: macos-13, goos: darwin, goarch: amd64 }
          - { runner: ubuntu-latest, goos: linux, goarch: amd64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build (native CGo)
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          out="wacli-${GOOS}-${GOARCH}"
          go build -trimpath -o "$out" ./cmd/wacli
          ./"$out" version || true
      - uses: actions/upload-artifact@v4
        with:
          name: wacli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: wacli-${{ matrix.goos }}-${{ matrix.goarch }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: |
          cd dist
          shasum -a 256 wacli-* > SHA256SUMS
          cat SHA256SUMS
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber dist/wacli-* dist/SHA256SUMS
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" \
              --notes "Powerpacks pinned wacli (full history sync). Prebuilt binaries, native per-arch." \
              dist/wacli-* dist/SHA256SUMS
          fi
