version: 2

project_name: wacli

builds:
  - id: wacli_linux_amd64
    main: ./cmd/wacli
    binary: wacli
    mod_timestamp: "{{ .CommitTimestamp }}"
    env:
      - CGO_ENABLED=1
      - CGO_CFLAGS=-Wno-error=missing-braces
    flags:
      - -trimpath
    tags:
      - sqlite_fts5
    ldflags:
      - -w -X main.version={{.Version}} -X main.releaseLinkerSetting=wacli-release-linker-version=[{{.Version}}]
    goos:
      - linux
    goarch:
      - amd64

  - id: wacli_linux_arm64
    main: ./cmd/wacli
    binary: wacli
    mod_timestamp: "{{ .CommitTimestamp }}"
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CGO_CFLAGS=-Wno-error=missing-braces
    flags:
      - -trimpath
    tags:
      - sqlite_fts5
    ldflags:
      - -w -X main.version={{.Version}} -X main.releaseLinkerSetting=wacli-release-linker-version=[{{.Version}}]
    goos:
      - linux
    goarch:
      - arm64

  - id: wacli_windows_amd64
    main: ./cmd/wacli
    binary: wacli
    mod_timestamp: "{{ .CommitTimestamp }}"
    env:
      - CGO_ENABLED=1
      - CC=x86_64-w64-mingw32-gcc
      - CGO_CFLAGS=-Wno-error=missing-braces
    flags:
      - -trimpath
    tags:
      - sqlite_fts5
    ldflags:
      - -w -X main.version={{.Version}} -X main.releaseLinkerSetting=wacli-release-linker-version=[{{.Version}}]
    goos:
      - windows
    goarch:
      - amd64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  disable: true
